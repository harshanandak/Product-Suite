<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projects — mockup</title>
<!--
  Corrected against the actual Linear reference:

  1. Linear DOES have a column header row (Name / Target / Health / ... ). The
     earlier "it's a list, not a table" read was wrong — what we disliked was the
     heavy bordered grid, not the columns. One hairline under the header, no cell
     borders, no row rules.
  2. Every column value is LEFT-justified at a fixed column x. Right-justifying
     the chips and pinning them with margin-left:auto is what opened the dead
     gulf between a short name and the metadata.
  3. Columns are distributed across the full width, so the row fills the space
     instead of splitting into a left cluster and a right cluster.
  4. Health is coloured text + dot (green / amber / red), not muted grey.

  NO Activity column (#130). It had no schema source — the bars were generated
  noise, and a backlog project would have shown activity that cannot exist. It
  stays out until there is a real event-rollup read model to draw it from.

  Fields grounded in packages/db/src/schema.ts:
  - projects (:186) name, status, leadId, targetDate — NO parent_id, so projects
    do not nest; the tree here is project -> work_items (work_items.projectId).
  - "Health stays DERIVED (never stored)" (:199).
  - projectStatusEnum (:177) backlog|planned|in_progress|paused|completed|canceled.
-->
<style>
  :root {
    --bg:#ffffff; --fg:#18181b; --muted-fg:#71717a; --faint:#a1a1aa;
    --border:#e4e4e7; --hover:#f7f7f8;
    --green:#16a34a; --amber:#d97706; --red:#dc2626; --gray:#a1a1aa; --violet:#7c3aed;
  }
  :root[data-theme="dark"] {
    --bg:#0c0c0e; --fg:#f4f4f5; --muted-fg:#8b8b93; --faint:#63636b;
    --border:#26262b; --hover:#161619;
    --green:#22c55e; --amber:#eab308; --red:#ef4444; --gray:#6b7280; --violet:#a78bfa;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.45 ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1440px; margin:0 auto; padding:0 28px 96px; }

  .top { display:flex; align-items:center; gap:14px; height:60px; }
  .top h1 { font-size:15px; font-weight:600; margin:0; letter-spacing:-0.01em; }
  .spacer { flex:1 }
  .tbtn { border:0; background:transparent; color:var(--muted-fg);
          border-radius:6px; padding:5px 8px; font-size:13px; cursor:pointer; }
  .tbtn:hover { background:var(--hover); color:var(--fg); }

  /* ONE grid template shared by the header and every row — this is what makes the
     columns line up without drawing any cell chrome. */
  .g {
    display:grid;
    grid-template-columns: minmax(300px,1fr) 130px 150px 130px 120px;
    align-items:center;
    column-gap:16px;
  }

  /* header: quiet labels, one hairline, left-justified like every value below */
  .head { padding:8px 10px; border-bottom:1px solid var(--border);
          position:sticky; top:0; background:var(--bg); z-index:2; }
  .head span { font-size:12px; font-weight:500; color:var(--muted-fg); }

  /* section label — our status grouping; Linear uses tabs, we group */
  .section { display:flex; align-items:center; gap:8px; margin:26px 0 2px; padding:0 10px; }
  .section .label { font-size:12.5px; font-weight:600; color:var(--muted-fg); }
  .section .count { font-size:12.5px; color:var(--faint); font-variant-numeric:tabular-nums; }

  /* rows: no borders, rounded hover only */
  .row { padding:11px 10px; border-radius:8px; cursor:pointer; min-height:52px; }
  .row:hover, .irow:hover { background:var(--hover); }

  .cell-name { display:flex; align-items:center; gap:10px; min-width:0; }
  .chev { width:12px; flex:none; color:var(--faint); font-size:9px; transition:transform .12s ease; }
  .row[aria-expanded="true"] .chev { transform:rotate(90deg); }
  .icon { width:22px; height:22px; border-radius:6px; display:grid; place-items:center;
          flex:none; font-size:11px; font-weight:600; color:#fff; }
  .nm { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* every value: left-justified in its column */
  .val { font-size:13px; color:var(--muted-fg); white-space:nowrap; font-variant-numeric:tabular-nums; }

  .health { display:flex; align-items:center; gap:7px; font-size:13px; font-weight:500; }
  .dot { width:8px; height:8px; border-radius:99px; flex:none; }

  .count-c { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted-fg);
             font-variant-numeric:tabular-nums; }
  .count-c b { color:var(--fg); font-weight:500; }
  .shield { width:13px; height:13px; border-radius:3px; border:1.5px solid var(--violet); flex:none; }

  .av { width:22px; height:22px; border-radius:99px; display:grid; place-items:center;
        font-size:10px; font-weight:600; color:#fff; flex:none; }
  .av.none { background:transparent; border:1px dashed var(--border); color:var(--faint); font-weight:400; }
  .lead-c { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted-fg); }


  /* ---- expanded work items ---- */
  .kids { display:none; }
  .kids.open { display:block; }
  .irow { padding:0 10px; border-radius:8px; cursor:pointer; }

  /* connector gutter — geometry copied from the shipped WorkboardTable so the
     spine bleeds past the row box and consecutive siblings join into one line */
  .cell-item { display:flex; align-items:center; gap:8px; min-width:0; align-self:stretch; }
  .gutter { width:34px; flex:none; align-self:stretch; position:relative;
            color:var(--border); min-height:42px; }
  .gutter svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .sdot { width:12px; height:12px; border-radius:99px; flex:none; border:1.6px solid var(--faint); }
  .sdot.done { background:var(--violet); border-color:var(--violet); }
  .sdot.prog { border-color:var(--amber); background:conic-gradient(var(--amber) 0 55%, transparent 55% 100%); }
  .ttl { font-size:13.5px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ttl.done { color:var(--muted-fg); }

  .more { padding:6px 10px 12px 54px; }
  .more a { font-size:13px; color:var(--muted-fg); text-decoration:none; }
  .more a:hover { color:var(--fg); text-decoration:underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Projects</h1>
    <div class="spacer"></div>
    <button class="tbtn">Group: Status</button>
    <button class="tbtn">Sort: Updated</button>
    <button class="tbtn">Views</button>
    <button class="tbtn" onclick="const r=document.documentElement;r.dataset.theme=r.dataset.theme==='dark'?'light':'dark'">Theme</button>
  </div>

  <div class="g head">
    <span>Name</span><span>Target</span><span>Health</span>
    <span>Items</span><span>Lead</span>
  </div>

  <div id="list"></div>
</div>

<script>
const CONNECTOR = (last) => `<svg viewBox="0 0 32 32" preserveAspectRatio="none" fill="none" aria-hidden="true">
  <path d="${last ? 'M10 -10 V10 Q10 16 16 16 H34' : 'M10 -10 V42 M10 10 Q10 16 16 16 H34'}"
        stroke="currentColor" stroke-width="1" vector-effect="non-scaling-stroke"/></svg>`;

// Derived at read time — never a stored column (schema.ts:199).
const H = { on:['On track','var(--green)'], risk:['At risk','var(--amber)'],
            off:['Off track','var(--red)'], none:['Not started','var(--gray)'] };

const ITEMS = {
  core:[ {key:'PRD-142',t:'Single validated write path for accepts',st:'done',a:['AR','#6366f1']},
         {key:'PRD-156',t:'Review Inbox: batch accept + undo',st:'prog',a:['MK','#0ea5e9']},
         {key:'PRD-161',t:'Inline chat proposal card',st:'prog',a:['JT','#8b5cf6']},
         {key:'PRD-178',t:'Memory capture on accept',st:'todo',a:null} ],
  infra:[{key:'INF-88',t:'Ephemeral Neon branch per contract test',st:'done',a:['MK','#0ea5e9']},
         {key:'INF-91',t:'Reap leaked branches before run',st:'done',a:['MK','#0ea5e9']},
         {key:'INF-97',t:'Tiered pre-push gate',st:'prog',a:['AR','#6366f1']} ],
};

const data = [
  { grp:'In Progress', rows:[
    {id:'core', c:'#6366f1',ic:'C',name:'Core product',      lead:['AR','#6366f1'],target:'Dec 2026',h:'on',  done:71,total:205,s:1},
    {id:'infra',c:'#0ea5e9',ic:'I',name:'Infra stability',   lead:['MK','#0ea5e9'],target:'Sep 2026',h:'on',  done:41,total:93, s:2},
    {id:'auto', c:'#8b5cf6',ic:'A',name:'Autonomous systems',lead:['JT','#8b5cf6'],target:'Dec 2026',h:'risk',done:22,total:85, s:3},
    {id:'apac', c:'#f43f5e',ic:'A',name:'APAC expansion',    lead:['SN','#f43f5e'],target:'Nov 2026',h:'on',  done:16,total:49, s:5},
  ]},
  { grp:'Planned', rows:[
    {id:'mob',  c:'#10b981',ic:'M',name:'Mobile apps',       lead:['DV','#10b981'],target:'Q1 2027', h:'none',done:0, total:27, s:4},
    {id:'jp',   c:'#f59e0b',ic:'J',name:'Japan launch',      lead:['SN','#f43f5e'],target:'Q2 2027', h:'none',done:0, total:31, s:6},
  ]},
  { grp:'Paused', rows:[
    {id:'l10n', c:'#ec4899',ic:'L',name:'Localization',      lead:['AR','#6366f1'],target:'H2 2027', h:'risk',done:4, total:18, s:7},
  ]},
  { grp:'Backlog', rows:[
    {id:'hard', c:'#64748b',ic:'P',name:'Platform hardening',lead:null,            target:null,      h:'none',done:0, total:12, s:8},
  ]},
];

const avatar = (a, cls='av') => a
  ? `<span class="${cls}" style="background:${a[1]}">${a[0]}</span>`
  : `<span class="${cls} none">+</span>`;

const itemRow = (it, last) => `
  <div class="g irow">
    <span class="cell-item">
      <span class="gutter">${CONNECTOR(last)}</span>
      <span class="sdot ${it.st==='done'?'done':it.st==='prog'?'prog':''}"></span>
      <span class="ttl ${it.st==='done'?'done':''}">${it.t}</span>
    </span>
    <span class="val">${it.key}</span>
    <span class="val"></span>
    <span class="val"></span>
    <span class="lead-c">${avatar(it.a)}</span>
    <span></span>
  </div>`;

const kids = (r) => {
  const list = ITEMS[r.id] ?? [];
  if (!list.length) return `<div class="more"><a href="#">No items yet — add one</a></div>`;
  return list.map((it,i)=>itemRow(it, i===list.length-1)).join('') +
    `<div class="more"><a href="#">View all ${r.total} items in ${r.name} &rarr;</a></div>`;
};

document.getElementById('list').innerHTML = data.map((g) => `
  <div class="section"><span class="label">${g.grp}</span><span class="count">${g.rows.length}</span></div>
  ${g.rows.map(r => `
    <div class="g row" aria-expanded="false" data-id="${r.id}">
      <span class="cell-name">
        <span class="chev">&#9654;</span>
        <span class="icon" style="background:${r.c}">${r.ic}</span>
        <span class="nm">${r.name}</span>
      </span>
      <span class="val">${r.target ?? '—'}</span>
      <span class="health" style="color:${H[r.h][1]}">
        <span class="dot" style="background:${H[r.h][1]}"></span>${H[r.h][0]}
      </span>
      <span class="count-c"><span class="shield"></span><b>${r.done}</b>/${r.total}</span>
      <span class="lead-c">${avatar(r.lead)}${r.lead ? r.lead[0] : ''}</span>
    </div>
    <div class="kids" data-kids="${r.id}">${kids(r)}</div>`).join('')}
`).join('');

document.querySelectorAll('.row').forEach((row) => {
  row.addEventListener('click', () => {
    const open = row.getAttribute('aria-expanded') === 'true';
    row.setAttribute('aria-expanded', String(!open));
    document.querySelector(`[data-kids="${row.dataset.id}"]`).classList.toggle('open', !open);
  });
});
document.querySelector('.row')?.click();
</script>
</body>
</html>

# SonarCloud Automatic Analysis configuration.
# docs/ holds documentation and design artifacts (clickable HTML wireframes,
# mental-model diagrams) — reference material, not shipped product code.
# The accessibility and SRI rules they trip are enforced for real product
# code by DESIGN.md section 8 and the standard analysis of apps/ and packages/.
sonar.exclusions=docs/**

# packages/ui/src/components and hooks vendor the shadcn/ui registry primitives
# (Button, Card, Dialog, DropdownMenu, Select, Table, Sidebar, …). These are
# copy-paste design-system components whose structural similarity to one another
# is inherent to the registry pattern — not a maintainability defect — so they are
# excluded from copy-paste (CPD) duplication detection only. Bug, security, and
# maintainability rules still apply to them; app code (apps/**) and the rest of
# packages/ keep full duplication analysis.
sonar.cpd.exclusions=packages/ui/src/components/**,packages/ui/src/hooks/**

# S6819 ("prefer a native HTML element over an ARIA role") is a false positive on
# two Workboard elements that genuinely cannot be native elements, but DO carry a
# correct role + full keyboard/mouse/touch support:
#   - the kanban CARD is a draggable element that nests an interactive descendant
#     (the provenance tooltip trigger) — a native <button> may not contain it;
#   - the summary CHART rollup is a visually-hidden text alternative — an <img>
#     element cannot hold a text/SVG summary.
# Suppress S6819 for just these two files; every other a11y rule still applies.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.e1.resourceKey=apps/platform-web/src/boards/workboard/kanban/WorkboardKanban.tsx
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.e2.resourceKey=apps/platform-web/src/boards/workboard/summary/WorkboardSummary.tsx

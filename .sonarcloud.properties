# SonarCloud Automatic Analysis configuration.
# docs/ holds documentation and design artifacts (clickable HTML wireframes,
# mental-model diagrams) — reference material, not shipped product code.
# The accessibility and SRI rules they trip are enforced for real product
# code by DESIGN.md section 8 and the standard analysis of apps/ and packages/.
sonar.exclusions=docs/**

# packages/ui/src/components and hooks vendor the shadcn/ui registry primitives
# (Button, Card, Dialog, DropdownMenu, Select, Table, Sidebar, …). These are
# copy-paste design-system components whose structural similarity to one another
# is inherent to the registry pattern — not a maintainability defect — so they are
# excluded from copy-paste (CPD) duplication detection only. Bug, security, and
# maintainability rules still apply to them; app code (apps/**) and the rest of
# packages/ keep full duplication analysis.
#
# Test files (*.test.ts / *.test.tsx) are likewise excluded from CPD ONLY: unit
# tests legitimately repeat arrange/mock boilerplate — identical vi.mock/vi.hoisted
# setups, fixture builders, and per-branch assertions across table-style suites —
# which is inherent to how they are written, not a maintainability defect.
# Correctness, security, and maintainability rules still apply to test files; only
# copy-paste duplication detection is suppressed for them.
sonar.cpd.exclusions=packages/ui/src/components/**,packages/ui/src/hooks/**,**/*.test.ts,**/*.test.tsx

# NOTE: SonarCloud Automatic Analysis (this project's mode) does NOT honor
# rule-on-file exclusions (sonar.issue.ignore.*) — verified empirically. The two
# S6819 false positives on the Workboard (kanban card / summary chart, both
# documented in their source) must be dismissed via "Mark as False Positive" in
# the SonarCloud UI. (If this repo ever moves to scanner-based CI analysis, add a
# sonar.issue.ignore.multicriteria block here instead.)

template:
  kind: forge.adoptionTemplate
  version: 0.0.16
  profile: standard
  description: Default Forge command flow with Kernel issue tracking and GitHub
    mirror metadata.
  ancestry:
    - forge.runtimeGraph.currentCommandFlow@0.0.17
    - forge.profile.standard@0.0.16
workflow:
  phases:
    plan:
      enabled: true
    dev:
      enabled: true
    validate:
      enabled: true
    ship:
      enabled: true
  gates:
    gate.plan-exit:
      enabled: true
    gate.dev-exit:
      enabled: true
    gate.validate-exit:
      enabled: true
    gate.ship-entry:
      enabled: true
    rail.tdd_intent:
      enabled: false
  classification:
    default: standard
adapters:
  issue:
    enabled: true
    primary: kernel
    mirrors:
      - github
  harness:
    enabled: true
    targets:
      - claude
protectedPaths:
  - .forge/config.yaml
  - AGENTS.md
  - .forge/patch.md
  - .forge/protected-paths.yaml
layer1Rails:
  confirmed: true
  rails:
    - secret_scan
    - branch_protection
    - signed_commits
    - schema_integrity
  toggleableRails:
    - tdd_intent

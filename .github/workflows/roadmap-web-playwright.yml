name: Roadmap Web Playwright

on:
  push:
    branches:
      - main
    paths:
      - "apps/roadmap-web/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "infra/supabase/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/roadmap-web-playwright.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/roadmap-web/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "infra/supabase/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/roadmap-web-playwright.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/roadmap-web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Browsers
        run: bun x playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: roadmap-playwright-report
          path: apps/roadmap-web/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: roadmap-playwright-results
          path: apps/roadmap-web/test-results/
          retention-days: 30

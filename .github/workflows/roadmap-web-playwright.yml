name: Roadmap Web Playwright

on:
  push:
    branches:
      - main
    paths:
      - "apps/roadmap-web/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "packages/ui-planning/**"
      - "packages/ui-charting/**"
      - "services/agent-core/**"
      - "services/hocuspocus/**"
      - "infra/supabase/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/roadmap-web-playwright.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/roadmap-web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect app-impacting changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(git -C "$GITHUB_WORKSPACE" diff --name-only "$base" "$head")"
          if echo "$changed_files" | grep -Eq '^(apps/roadmap-web/|packages/contracts/|packages/sdk/|packages/ui-chat/|packages/ui-canvas/|packages/ui-meeting/|packages/ui-planning/|packages/ui-charting/|services/agent-core/|services/hocuspocus/|infra/supabase/|package\.json$|bun\.lock$|\.github/workflows/roadmap-web-playwright\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.changes.outputs.run == 'true'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright Browsers
        if: steps.changes.outputs.run == 'true'
        run: bun x playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.changes.outputs.run == 'true'
        run: bun run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always() && steps.changes.outputs.run == 'true'
        with:
          name: roadmap-playwright-report
          path: apps/roadmap-web/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always() && steps.changes.outputs.run == 'true'
        with:
          name: roadmap-playwright-results
          path: apps/roadmap-web/test-results/
          retention-days: 30

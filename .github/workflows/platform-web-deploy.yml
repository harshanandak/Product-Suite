name: Platform Web Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/platform-web/**"
      - "packages/ui/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/platform-web-deploy.yml"
  pull_request:
    paths:
      - "apps/platform-web/**"
      - "packages/ui/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/platform-web-deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Vercel-style preview DX (modeled on harshanandak/Zwapit) on Cloudflare Workers
# static assets — DESIGN §10 (Cloudflare, not Vercel). Per-PR preview is uploaded
# with `wrangler versions upload`, and the URL is surfaced as a GitHub Deployment
# (transient per-PR environment) plus a sticky PR comment; production deploys on
# main. The job skips green until the required secrets are configured.
permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check Cloudflare credentials
        id: guard
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_CLERK_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ] && [ -n "$CF_CLERK_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Required secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, VITE_CLERK_PUBLISHABLE_KEY) not set — skipping deploy. Add them in repo Settings → Secrets and variables → Actions to enable preview/production deploys."
          fi

      - name: Setup Bun
        if: steps.guard.outputs.ready == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.guard.outputs.ready == 'true'
        run: bun run --cwd apps/platform-web build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare
        id: deploy
        if: steps.guard.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "kind=production" >> "$GITHUB_OUTPUT"
            out="$(bun run --cwd apps/platform-web deploy 2>&1 | tee /dev/stderr)"
          else
            echo "kind=preview" >> "$GITHUB_OUTPUT"
            out="$(bun run --cwd apps/platform-web deploy:preview 2>&1 | tee /dev/stderr)"
          fi
          url="$(printf '%s\n' "$out" | grep -Eo 'https://[A-Za-z0-9._-]+\.workers\.dev[^[:space:]]*' | head -n1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Record deployment + preview comment
        if: steps.guard.outputs.ready == 'true' && steps.deploy.outputs.url != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const url = ${{ toJSON(steps.deploy.outputs.url) }};
            const kind = ${{ toJSON(steps.deploy.outputs.kind) }};
            const isPreview = kind === 'preview';
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const sha = (pr && pr.head && pr.head.sha) || context.sha;

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: sha,
              environment: isPreview ? 'preview' : 'production',
              transient_environment: isPreview,
              production_environment: !isPreview,
              auto_merge: false,
              required_contexts: [],
              description: `platform-web ${kind}`,
            });
            if (deployment.data && deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner,
                repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: url,
                description: `platform-web ${kind} deploy`,
              });
            }

            if (isPreview && pr) {
              const marker = '<!-- platform-web-preview -->';
              const body = [
                marker,
                '### ⚡ platform-web preview',
                '',
                '| | |',
                '| --- | --- |',
                '| **Status** | ✅ Ready |',
                `| **Preview** | ${url} |`,
                `| **Commit** | \`${sha.slice(0, 7)}\` |`,
                '',
                '_Cloudflare Workers static assets — refreshed on every push to this PR._',
              ].join('\n');
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const existing = comments.find((c) => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
              }
            }

name: DB Contract

# Real-DB contract tier (atomic-accept wave, Lane B). Runs the platform-api
# `test/db-contract` suite against an EPHEMERAL Neon branch created per run, so the
# accept/create path is exercised over the real neon-http driver + real migrations.
# Isolated from the Platform Web CI job on purpose.
#
# Requires the `NEON_API_KEY` (account API key) and `NEON_PROJECT_ID` secrets. When
# they are absent (e.g. a fork PR that can't read secrets) the suite self-skips via
# `describe.skipIf`, so the job stays green without ever touching a database.

on:
  push:
    branches:
      - main
    paths:
      - "apps/platform-api/**"
      - "packages/db/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/db-contract.yml"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  db-contract:
    name: db-contract
    runs-on: ubuntu-latest
    # Neon secrets are scoped to ONLY the steps that need them (below), NOT the
    # job level — otherwise `bun install`'s lifecycle scripts (e.g. `prepare`)
    # would run with NEON_API_KEY in the environment, letting a compromised
    # dependency exfiltrate it.
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Report Neon credential availability
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          if [ -n "$NEON_API_KEY" ] && [ -n "$NEON_PROJECT_ID" ]; then
            echo "Neon credentials present — db-contract suite will run against ephemeral branches."
          else
            echo "::notice::NEON_API_KEY/NEON_PROJECT_ID not set — db-contract suite self-skips (no real-DB run)."
          fi

      - name: Run db-contract suite (ephemeral Neon branch per test)
        working-directory: apps/platform-api
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
        run: bunx vitest run test/db-contract

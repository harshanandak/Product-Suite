name: Roadmap Web CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/roadmap-web/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "packages/ui-planning/**"
      - "packages/ui-charting/**"
      - "services/agent-core/**"
      - "services/hocuspocus/**"
      - "infra/supabase/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/roadmap-web-ci.yml"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/roadmap-web
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect app-impacting changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(git -C "$GITHUB_WORKSPACE" diff --name-only "$base" "$head")"
          if echo "$changed_files" | grep -Eq '^(apps/roadmap-web/|packages/contracts/|packages/sdk/|packages/ui-chat/|packages/ui-canvas/|packages/ui-meeting/|packages/ui-planning/|packages/ui-charting/|services/agent-core/|services/hocuspocus/|infra/supabase/|package\.json$|bun\.lock$|\.github/workflows/roadmap-web-ci\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.changes.outputs.run == 'true'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: bun install --frozen-lockfile

      - name: TypeScript type checking
        if: steps.changes.outputs.run == 'true'
        run: bun x tsc --noEmit

      - name: ESLint
        if: steps.changes.outputs.run == 'true'
        run: bun run lint
        continue-on-error: true

      - name: Roadmap unit tests
        if: steps.changes.outputs.run == 'true'
        run: bun run test

      - name: Build Next.js application
        if: steps.changes.outputs.run == 'true'
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          OPENROUTER_API_KEY: placeholder-openrouter-key
          PARALLEL_API_KEY: placeholder-parallel-key

      - name: Report build size
        if: steps.changes.outputs.run == 'true'
        run: |
          echo "### Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

name: Roadmap Web CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/roadmap-web/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "packages/ui-planning/**"
      - "packages/ui-charting/**"
      - "services/agent-core/**"
      - "infra/supabase/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/roadmap-web-ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/roadmap-web/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "packages/ui-planning/**"
      - "packages/ui-charting/**"
      - "services/agent-core/**"
      - "infra/supabase/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/roadmap-web-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/roadmap-web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type checking
        run: bun x tsc --noEmit

      - name: ESLint
        run: bun run lint
        continue-on-error: true

      - name: Roadmap unit tests
        run: bun run test

      - name: Build Next.js application
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          OPENROUTER_API_KEY: placeholder-openrouter-key
          PARALLEL_API_KEY: placeholder-parallel-key

      - name: Report build size
        run: |
          echo "### Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

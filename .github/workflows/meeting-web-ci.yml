name: Meeting Web CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/meeting-web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/meeting-web-ci.yml"
  pull_request:
    paths:
      - "apps/meeting-web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/meeting-web-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  meeting-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/meeting-web
    env:
      CI: "true"
      VITE_BACKEND_URL: https://backend.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build


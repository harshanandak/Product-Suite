name: Platform Web CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/platform-web/**"
      - "packages/ui/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/platform-web-ci.yml"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  platform-web:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect app-impacting changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(git -C "$GITHUB_WORKSPACE" diff --name-only "$base" "$head")"
          if echo "$changed_files" | grep -Eq '^(apps/platform-web/|packages/ui/|package\.json$|bun\.lock$|\.github/workflows/platform-web-ci\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.changes.outputs.run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: bun install --frozen-lockfile

      - name: Design-system tests (packages/ui)
        if: steps.changes.outputs.run == 'true'
        run: bun run test:ui

      - name: Lint, typecheck, test, build (apps/platform-web)
        if: steps.changes.outputs.run == 'true'
        run: bun run ci:platform-web

name: Platform API Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/platform-api/**"
      - "packages/db/**"
      - "packages/contracts/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/platform-api-deploy.yml"
  # Manual trigger is the ONLY way `migrate` (below) ever runs — see that job's
  # comment. A normal push to main only redeploys the Worker.
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Applying drizzle migrations against the shared Neon DB is the one
  # irreversible step in this pipeline (kernel issue 9256d8e4 — the deploy
  # pipeline previously never ran migrations at all, so the shared DB drifted
  # 13 migrations behind merged code). This job is human-gated two ways:
  #   1. `if:` restricts it to workflow_dispatch — it NEVER runs on an
  #      automatic push, so a human always has to start the run from the
  #      Actions tab.
  #   2. `environment: db-migrate-production` — configure required reviewers
  #      on that environment (repo Settings -> Environments) for a second,
  #      explicit approval gate before the job is allowed to start. This repo
  #      setting is out of band from this workflow file and must be set up by
  #      a maintainer; until it is, gate #1 alone still prevents any
  #      unattended apply.
  # Also see the Product-Suite drizzle snapshot-drift memory: the meta
  # snapshot chain has been hand-reconciled before (regenerating journal
  # timestamps for ALREADY-APPLIED migrations breaks the migrator — treat
  # that as a breaking act, never a routine `drizzle-kit generate`).
  migrate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: db-migrate-production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check DATABASE_URL
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret not set — cannot run migrations. Add it in repo Settings -> Secrets and variables -> Actions (this is a CI-only credential, separate from the 'wrangler secret put DATABASE_URL' value the Worker uses at runtime, though both should point at the same shared Neon DB)."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Schema-parity check before applying
        run: node scripts/check-migration-parity.mjs packages/db/migrations

      - name: Run drizzle migrations against the shared DB
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run migrate

  deploy:
    needs: migrate
    # Runs on every push (migrate is skipped -> result "skipped", not
    # "failure", so this still proceeds) and after a manually-triggered
    # migrate that succeeded. Never runs if a manual migrate failed.
    if: ${{ always() && needs.migrate.result != 'failure' && needs.migrate.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check Cloudflare credentials
        id: guard
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Required secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID) not set — skipping deploy. Add them in repo Settings -> Secrets and variables -> Actions to enable this pipeline."
          fi

      - name: Setup Bun
        if: steps.guard.outputs.ready == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      - name: Deploy Worker
        if: steps.guard.outputs.ready == 'true'
        working-directory: apps/platform-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # platform-api has no wrangler devDependency of its own — it reuses
        # the one already pinned (^4.0.0) and installed by apps/platform-web
        # via bun's hoisted workspace install, resolved here through bunx.
        run: bunx wrangler deploy

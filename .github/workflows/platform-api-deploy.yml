name: Platform API Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/platform-api/**"
      - "packages/db/**"
      - "packages/contracts/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/platform-api-deploy.yml"
  # Manual trigger is the ONLY way `migrate` (below) ever runs — see that job's
  # comment. A normal push to main never runs migrate, and (see `deploy`'s
  # `needs:` gate) therefore never auto-deploys either: this whole pipeline is
  # human-started, on purpose, because it can touch the shared prod DB.
# DELIBERATELY NO workflow-level `concurrency` block. A workflow-level group
# with `cancel-in-progress: true` cancels the ENTIRE run — including an
# approved, executing `migrate` — when a later push/dispatch enters the same
# group, and a job-level `cancel-in-progress: false` does NOT override that
# workflow-level cancellation (they are separate scopes). That would let a
# newer run terminate `bun run migrate` mid-flight against the shared prod DB.
# Concurrency is therefore declared per-job below: `migrate` gets a dedicated
# non-cancelling group (never interrupted), while `preflight` and `deploy` get
# their own cancellable groups. Do NOT reintroduce a top-level `concurrency:`.
permissions:
  contents: read

jobs:
  # Preflight MUST pass before `migrate` touches the shared prod DB. It runs
  # the same verification `deploy` needs (typecheck + test) AND fails fast when
  # the Cloudflare deploy credentials are missing, so a run that would fail to
  # typecheck/test, or that could never actually deploy, never applies a
  # migration to the shared Neon DB first (kernel finding: verification lived
  # downstream of migrate, so a broken build / missing deploy creds was only
  # discovered AFTER the irreversible migration had already run). Gated to the
  # exact same conditions as `migrate` (workflow_dispatch AND refs/heads/main)
  # so it only runs in the real, human-started deploy path.
  preflight:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Own cancellable group: a newer dispatch supersedes an older run's
    # not-yet-finished verification. Safe to cancel — no shared-DB side effects
    # here. This is job-scoped, so it can never reach the `migrate` job's group.
    concurrency:
      group: platform-api-preflight-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check Cloudflare deploy credentials
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::Required deploy secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID) not set — refusing to run migrations for a deploy that could never complete. Add them in repo Settings -> Secrets and variables -> Actions to enable this pipeline."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run platform-api checks
        # typecheck + test — the same gate the Worker needs (root package.json
        # `verify:platform-api`). A broken build must fail HERE, before any
        # migration touches the shared prod DB.
        run: bun run verify:platform-api

  # Applying drizzle migrations against the shared Neon DB is the one
  # irreversible step in this pipeline (kernel issue 9256d8e4 — the deploy
  # pipeline previously never ran migrations at all, so the shared DB drifted
  # 13 migrations behind merged code). This job is human-gated three ways:
  #   1. `if:` restricts it to workflow_dispatch AND refs/heads/main — it
  #      NEVER runs on an automatic push, and a manual run targeting any
  #      other branch/ref is rejected too (workflow_dispatch can target any
  #      ref, so the push trigger's `branches: main` filter alone does not
  #      protect it).
  #   2. `environment: db-migrate-production` — configure required reviewers
  #      on that environment (repo Settings -> Environments) for a second,
  #      explicit approval gate before the job is allowed to start. This repo
  #      setting is out of band from this workflow file and must be set up by
  #      a maintainer; until it is, gate #1 alone still prevents any
  #      unattended apply.
  #   3. Its own dedicated job-level `concurrency` group with
  #      `cancel-in-progress: false`. There is intentionally NO workflow-level
  #      concurrency (see the top-of-file comment), so nothing at a wider
  #      scope can cancel this run: a pending or executing migrate can never be
  #      cancelled by a newer push or dispatch — an interrupted `bun run
  #      migrate` would leave the schema half-applied. Later migrate runs queue
  #      instead of pre-empting one another.
  # Also see the Product-Suite drizzle snapshot-drift memory: the meta
  # snapshot chain has been hand-reconciled before (regenerating journal
  # timestamps for ALREADY-APPLIED migrations breaks the migrator — treat
  # that as a breaking act, never a routine `drizzle-kit generate`).
  migrate:
    # `needs: [preflight]` is the ordering fix: GitHub's default needs-gate runs
    # migrate ONLY after preflight succeeds (a skipped/failed preflight skips
    # migrate), so verification + the deploy-credential check always happen
    # BEFORE this irreversible step. The three human gates below are unchanged.
    needs: [preflight]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: db-migrate-production
    concurrency:
      group: db-migrate-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check DATABASE_URL
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret not set — cannot run migrations. Add it in repo Settings -> Secrets and variables -> Actions (this is a CI-only credential, separate from the 'wrangler secret put DATABASE_URL' value the Worker uses at runtime, though both should point at the same shared Neon DB)."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        # --ignore-scripts: this job has DATABASE_URL in scope once the
        # migrate step runs; a compromised dependency's postinstall must not
        # get a chance to read it. The repo's own `prepare` (lefthook) is
        # irrelevant in CI, so skipping lifecycle scripts is free here.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Schema-parity check before applying
        run: node scripts/check-migration-parity.mjs packages/db/migrations

      - name: Run drizzle migrations against the shared DB
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run migrate

  deploy:
    needs: [migrate]
    # No custom `if:` here on purpose. GitHub Actions' default gate for a job
    # with `needs:` runs it ONLY when every needed job completed successfully
    # — a *skipped* needed job does not count as success, so this job is
    # skipped whenever `migrate` was skipped (every push), failed, or was
    # cancelled, and runs only after a manually-dispatched `migrate` on main
    # succeeds. That also means every deploy — schema-touching or not —
    # currently requires a manual run; this pipeline is new (built in the
    # same change as `migrate`), so there is no prior automatic-deploy
    # behavior being narrowed here.
    runs-on: ubuntu-latest
    # Own cancellable group so a newer run supersedes an in-flight Worker
    # deploy (wrangler applies a new version atomically; a superseded deploy is
    # simply replaced by the newer one). Job-scoped and separate from
    # `migrate`'s group, so cancelling a deploy never touches a migration.
    concurrency:
      group: platform-api-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check Cloudflare credentials
        id: guard
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Required secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID) not set — skipping deploy. Add them in repo Settings -> Secrets and variables -> Actions to enable this pipeline."
          fi

      - name: Setup Bun
        if: steps.guard.outputs.ready == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: bun install --frozen-lockfile --ignore-scripts

      # No verify step here: the `preflight` job (which gates `migrate`, which
      # gates this job) already ran `verify:platform-api` before any migration,
      # so re-running the full typecheck+test suite on the same commit here
      # would be redundant. The `guard` above stays as cheap defense-in-depth —
      # preflight already hard-fails on missing creds, so `ready` is expected
      # true whenever this job runs.
      - name: Deploy Worker (production)
        if: steps.guard.outputs.ready == 'true'
        working-directory: apps/platform-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # `--env production` selects the `env.production` block in
        # wrangler.jsonc (Worker: platform-api-production). Without it,
        # `wrangler deploy` targets the top-level (non-production) Worker and
        # the real API is never updated. platform-api has no wrangler
        # devDependency of its own — it reuses the exact version
        # apps/platform-web pins (^4.0.0, resolved to 4.100.0 in bun.lock),
        # pinned explicitly here so bunx never pulls an unverified "latest".
        run: bunx wrangler@4.100.0 deploy --env production

name: Repo Tooling CI

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "packages/ui-planning/**"
      - "packages/ui-charting/**"
      - "services/agent-core/**"
      - "test/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/meeting-api-ci.yml"
      - ".github/workflows/meeting-api-railway-preview.yml"
      - ".github/workflows/meeting-web-ci.yml"
      - ".github/workflows/repo-tooling-ci.yml"
      - ".github/workflows/roadmap-web-ci.yml"
      - ".github/workflows/roadmap-web-playwright.yml"
  pull_request:
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "packages/contracts/**"
      - "packages/sdk/**"
      - "packages/ui-chat/**"
      - "packages/ui-canvas/**"
      - "packages/ui-meeting/**"
      - "packages/ui-planning/**"
      - "packages/ui-charting/**"
      - "services/agent-core/**"
      - "test/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/meeting-api-ci.yml"
      - ".github/workflows/meeting-api-railway-preview.yml"
      - ".github/workflows/meeting-web-ci.yml"
      - ".github/workflows/repo-tooling-ci.yml"
      - ".github/workflows/roadmap-web-ci.yml"
      - ".github/workflows/roadmap-web-playwright.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run root tooling tests
        run: bun run test:contracts && bun run test:ui-chat && bun run test:ui-canvas && bun run test:ui-meeting && bun run test:ui-planning && bun run test:ui-charting && bun run test:agent-core && bun run test:repo-tooling
